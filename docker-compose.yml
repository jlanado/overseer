services:
  postgres:
    image: postgres:16.14-alpine
    container_name: overseer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  gitea:
    image: gitea/gitea:1.26.4
    container_name: overseer-gitea
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__actions__ENABLED=true
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=${POSTGRES_DB}
      - GITEA__database__USER=${POSTGRES_USER}
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD}
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      retries: 5
      start_period: 20s

  runner:
    image: gitea/runner:2.0.1
    container_name: overseer-runner
    restart: unless-stopped
    environment:
      - GITEA_INSTANCE_URL=${GITEA_URL}
      - GITEA_RUNNER_REGISTRATION_TOKEN=${RUNNER_TOKEN}
      - GITEA_RUNNER_NAME=overseer-runner
    volumes:
      - runner-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      gitea:
        condition: service_healthy

  registry:
    image: registry:2.8.3
    container_name: overseer-registry
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry

  orchestrator:
    build: ./orchestrator
    container_name: overseer-orchestrator
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      # LiteLLM proxy mode (leave .env's LITELLM_BASE_URL empty to use
      # direct Anthropic API instead — see .env.example for both modes)
      - LITELLM_BASE_URL=${LITELLM_BASE_URL}
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - ANTHROPIC_SMALL_FAST_MODEL=${ANTHROPIC_SMALL_FAST_MODEL}
      - REVIEWER_MODEL=${REVIEWER_MODEL}
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # lets Deploy node run `docker compose up`
      - orchestrator-workspace:/workspace             # scratch dir for per-run repo clones
    depends_on:
      postgres:
        condition: service_healthy

  approval-ui:
    build: ./approval-ui
    container_name: overseer-approval-ui
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

  # --- Optional observability stack ---
  # Enable with: docker compose --profile observability up -d
  # Requires LANGFUSE_NEXTAUTH_SECRET / LANGFUSE_SALT / LANGFUSE_ENCRYPTION_KEY
  # set in .env (see .env.example for how to generate).
  langfuse:
    image: langfuse/langfuse:3.210.0
    container_name: overseer-langfuse
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3001
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  gitea-data:
  runner-data:
  registry-data:
  orchestrator-workspace:
